{{ define "main" }}

<div class="search-container">
  <div class="section-header" style="margin-bottom: var(--space-xl);">
    <h1 class="section-title" style="font-size: var(--text-3xl);">Search</h1>
    <p class="section-subtitle">Find articles by keyword, topic, or content</p>
  </div>

  <div class="search-box">
    <input
      type="text"
      id="search-input"
      placeholder="Start typing to search..."
      autocomplete="off"
      aria-label="Search"
      style="font-size: var(--text-base);"
    />
  </div>

  <div id="search-info" style="text-align: center; margin-top: var(--space-md); color: var(--color-text-muted); font-size: var(--text-sm);"></div>

  <div id="search-results" style="margin-top: var(--space-xl);"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
<script>
  let searchIndex = null;
  let fuse = null;

  fetch('{{ "index.json" | relURL }}')
    .then(response => response.json())
    .then(data => {
      searchIndex = data;

      const options = {
        keys: [
          { name: 'title', weight: 0.4 },
          { name: 'tags', weight: 0.3 },
          { name: 'summary', weight: 0.2 },
          { name: 'content', weight: 0.1 }
        ],
        threshold: 0.4,
        includeScore: true,
        minMatchCharLength: 2,
        ignoreLocation: true
      };

      fuse = new Fuse(searchIndex, options);

      document.getElementById('search-info').textContent =
        `Ready to search ${searchIndex.length} articles`;
    })
    .catch(error => {
      console.error('Error loading search index:', error);
      document.getElementById('search-info').textContent =
        'Error loading search. Please refresh the page.';
    });

  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  const searchInfo = document.getElementById('search-info');

  function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
      const later = () => {
        clearTimeout(timeout);
        func(...args);
      };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  }

  function performSearch(query) {
    if (!fuse || !query || query.length < 2) {
      searchResults.innerHTML = '';
      if (query && query.length > 0 && query.length < 2) {
        searchInfo.textContent = 'Please enter at least 2 characters';
      } else {
        searchInfo.textContent = `Ready to search ${searchIndex.length} articles`;
      }
      return;
    }

    const results = fuse.search(query);

    if (results.length === 0) {
      searchResults.innerHTML = '<p style="text-align: center; color: var(--color-text-muted); padding: var(--space-xl);">No results found. Try different keywords.</p>';
      searchInfo.textContent = `No results for "${query}"`;
      return;
    }

    searchInfo.textContent = `Found ${results.length} result${results.length > 1 ? 's' : ''} for "${query}"`;

    searchResults.innerHTML = '<div class="blog-grid">' + results.map(result => {
      const item = result.item;
      const date = new Date(item.date).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });

      const baseURL = '{{ .Site.BaseURL }}';
      const tags = item.tags ? item.tags.map(tag =>
        `<a href="${baseURL}tags/${tag.toLowerCase().replace(/\s+/g, '-')}" class="tag">${tag}</a>`
      ).join('') : '';

      return `
        <article class="blog-card">
          <div class="post-meta">
            <time>${date}</time>
          </div>
          <h2><a href="${item.permalink}">${item.title}</a></h2>
          ${tags ? `<div class="post-tags">${tags}</div>` : ''}
          <p>${item.summary || ''}</p>
          <a href="${item.permalink}" class="read-more">Read article →</a>
        </article>
      `;
    }).join('') + '</div>';
  }

  searchInput.addEventListener('input', debounce(function(e) {
    performSearch(e.target.value.trim());
  }, 300));

  window.addEventListener('load', () => {
    searchInput.focus();

    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q');
    if (query) {
      searchInput.value = query;
      const checkLoaded = setInterval(() => {
        if (fuse) {
          performSearch(query);
          clearInterval(checkLoaded);
        }
      }, 100);
    }
  });
</script>

{{ end }}
