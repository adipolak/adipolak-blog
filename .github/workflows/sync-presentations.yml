# Sync Presentations from Google Sheets
# This workflow automatically updates your presentations from a Google Sheet

name: Sync Presentations

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Sync from Google Sheets
        env:
          SHEET_URL: ${{ secrets.PRESENTATIONS_SHEET_URL }}
        run: |
          python scripts/sync-presentations.py

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/presentations.yaml
          git diff --quiet && git diff --staged --quiet || git commit -m "Update presentations from Google Sheets"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
